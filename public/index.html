<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT → MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c8ff00;
      --accent-dim: #8faf00;
      --text: #f0f0f0;
      --muted: #666;
      --error: #ff4d4d;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .badge {
      display: inline-block;
      background: rgba(200,255,0,0.1);
      border: 1px solid rgba(200,255,0,0.3);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* Input card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      margin-bottom: 1.2rem;
    }

    .input-group {
      display: flex;
      gap: 0.6rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    button {
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .btn-fetch {
      background: var(--accent);
      color: #000;
      padding: 0.85rem 1.4rem;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-fetch:hover { background: #d8ff20; transform: translateY(-1px); }
    .btn-fetch:active { transform: translateY(0); }
    .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Result card */
    #result-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      margin-bottom: 1.2rem;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-inner {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    #thumb {
      width: 90px;
      height: 68px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .result-info { flex: 1; min-width: 0; }

    .result-title {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.3rem;
    }

    .result-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .result-meta span { margin-right: 1rem; }

    .btn-download {
      background: var(--accent);
      color: #000;
      padding: 0.7rem 1.2rem;
      font-size: 0.85rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-download:hover { background: #d8ff20; transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Progress */
    #progress-wrap {
      display: none;
      margin-top: 1rem;
    }

    .progress-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-bg {
      background: var(--bg);
      border-radius: 999px;
      height: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s;
    }

    /* Status / error */
    #status {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      display: none;
      margin-top: 0.8rem;
    }

    #status.error {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.3);
      color: var(--error);
      display: block;
    }

    #status.info {
      background: rgba(200,255,0,0.07);
      border: 1px solid rgba(200,255,0,0.2);
      color: var(--accent);
      display: block;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* How to use */
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }

    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(200,255,0,0.12);
      color: var(--accent);
      font-weight: 800;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .step-text {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }

    @media (max-width: 500px) {
      .steps { grid-template-columns: 1fr; }
      .input-group { flex-direction: column; }
      .result-inner { flex-wrap: wrap; }
      .btn-download { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">⚡ Free &amp; No Limits</div>
    <h1>YouTube <span>→ MP3</span></h1>
    <p class="subtitle">Paste any YouTube link. Get your MP3 instantly.</p>
  </header>

  <!-- Steps -->
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Copy a YouTube video URL</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Paste it below &amp; click Fetch</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Download your MP3 file</div>
    </div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="input-group">
      <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." />
      <button class="btn-fetch" id="fetch-btn" onclick="fetchInfo()">Fetch</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Result -->
  <div id="result-card">
    <div class="result-inner">
      <img id="thumb" src="" alt="thumbnail" />
      <div class="result-info">
        <div class="result-title" id="vid-title">—</div>
        <div class="result-meta">
          <span id="vid-author">—</span>
          <span id="vid-duration">—</span>
        </div>
      </div>
      <button class="btn-download" id="dl-btn" onclick="downloadMp3()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download MP3
      </button>
    </div>
    <div id="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">Converting...</span>
        <span id="prog-pct"></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-bar"></div>
      </div>
    </div>
  </div>

  <footer>
    Built with Node.js + Express + ytdl-core &mdash;
    <a href="https://github.com/" target="_blank">GitHub</a> &mdash;
    For personal use only. Respect copyright.
  </footer>
</div>

<script>
  let currentUrl = '';

  // Detect if opened via Live Server (wrong port) and warn user
  const API_BASE = (location.port && location.port !== '3000')
    ? 'http://localhost:3000'
    : '';

  window.addEventListener('DOMContentLoaded', () => {
    if (location.port && location.port !== '3000') {
      const warn = document.createElement('div');
      warn.style.cssText = `
        position:fixed; top:0; left:0; right:0; z-index:9999;
        background:#ff4d4d; color:#fff; text-align:center;
        font-family:'DM Mono',monospace; font-size:0.8rem; padding:10px 1rem;
      `;
      warn.innerHTML = `⚠️ You opened this via Live Server (port ${location.port}). 
        Please open <a href="http://localhost:3000" style="color:#fff;font-weight:bold;text-decoration:underline">
        http://localhost:3000</a> instead — after running <strong>node server.js</strong> in your terminal.`;
      document.body.prepend(warn);
    }
  });

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type || '';
    el.style.display = msg ? 'block' : 'none';
  }

  async function fetchInfo() {
    const input = document.getElementById('url-input');
    const url = input.value.trim();
    if (!url) return setStatus('Please paste a YouTube URL.', 'error');

    const fetchBtn = document.getElementById('fetch-btn');
    fetchBtn.disabled = true;
    fetchBtn.innerHTML = '<span class="spinner"></span>';
    document.getElementById('result-card').style.display = 'none';
    setStatus('');

    try {
      const res = await fetch(`${API_BASE}/api/info?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Failed to fetch info');

      currentUrl = url;
      document.getElementById('thumb').src = data.thumbnail || '';
      document.getElementById('vid-title').textContent = data.title;
      document.getElementById('vid-author').textContent = '🎵 ' + data.author;
      document.getElementById('vid-duration').textContent = '⏱ ' + data.duration;
      document.getElementById('result-card').style.display = 'block';
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('dl-btn').disabled = false;
      document.getElementById('dl-btn').innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download MP3`;
      setStatus('');
    } catch (err) {
      setStatus(err.message, 'error');
    } finally {
      fetchBtn.disabled = false;
      fetchBtn.textContent = 'Fetch';
    }
  }

  async function downloadMp3() {
    if (!currentUrl) return;

    const dlBtn = document.getElementById('dl-btn');
    const progWrap = document.getElementById('progress-wrap');
    const progBar = document.getElementById('prog-bar');
    const progLabel = document.getElementById('prog-label');
    const progPct = document.getElementById('prog-pct');

    dlBtn.disabled = true;
    dlBtn.innerHTML = '<span class="spinner"></span> Converting...';
    progWrap.style.display = 'block';
    progBar.style.width = '0%';
    progLabel.textContent = 'Connecting to server...';
    progPct.textContent = '';

    // Animate a fake progress bar (real progress isn't streamed to browser)
    let pct = 0;
    const timer = setInterval(() => {
      pct = Math.min(pct + Math.random() * 8, 85);
      progBar.style.width = pct + '%';
      progLabel.textContent = pct < 30 ? 'Downloading audio...' : pct < 65 ? 'Converting to MP3...' : 'Finalizing...';
      progPct.textContent = Math.round(pct) + '%';
    }, 400);

    try {
      const response = await fetch(`${API_BASE}/api/download?url=${encodeURIComponent(currentUrl)}`);
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Download failed');
      }

      const blob = await response.blob();
      clearInterval(timer);
      progBar.style.width = '100%';
      progPct.textContent = '100%';
      progLabel.textContent = 'Done!';

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const title = document.getElementById('vid-title').textContent.replace(/[^\w\s-]/g, '').trim();
      a.download = title + '.mp3';
      a.click();
      URL.revokeObjectURL(a.href);

      setTimeout(() => {
        progWrap.style.display = 'none';
        dlBtn.disabled = false;
        dlBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Again`;
      }, 1500);
    } catch (err) {
      clearInterval(timer);
      progWrap.style.display = 'none';
      setStatus(err.message, 'error');
      dlBtn.disabled = false;
      dlBtn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download MP3`;
    }
  }

  // Allow pressing Enter in input
  document.getElementById('url-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') fetchInfo();
  });
</script>
</body>
</html>
